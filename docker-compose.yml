services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: robot_fleet
      POSTGRES_USER: fleet_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localdev}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleet_admin -d robot_fleet"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./api
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: robot_fleet
      DB_USER: fleet_admin
      DB_PASSWORD: ${DB_PASSWORD:-localdev}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      JWT_EXPIRES_IN: 24h
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./api/src:/app/src

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://api:3001
    depends_on:
      - api
    volumes:
      - ./frontend/src:/app/src

volumes:
  pgdata:
