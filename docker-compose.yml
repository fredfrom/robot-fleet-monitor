services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: robot_fleet
      POSTGRES_USER: fleet_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localdev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleet_admin -d robot_fleet"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./api
    expose:
      - "3001"
    environment:
      PORT: 3001
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: robot_fleet
      DB_USER: fleet_admin
      DB_PASSWORD: ${DB_PASSWORD:-localdev}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      JWT_EXPIRES_IN: 24h
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=${API_URL:-}
    expose:
      - "80"
    depends_on:
      - api

volumes:
  pgdata:
